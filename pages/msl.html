<!DOCTYPE html>
<html>
 <head>
  <title>
   Warwick SU | Log In
  </title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,400italic,600,700" rel="stylesheet" type="text/css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/msl/Content/styles?v=jKvHT4fbl7cRQRBtioZ54XIhRFPsVKJG-oTXcTPjh501" rel="stylesheet"/>
 </head>
 <body class="login-page">
  <form action="./Login.aspx?ReturnUrl=%2fmsl%2f" id="form1" method="post">
   <div class="aspNetHidden">
   </div>
   <div class="aspNetHidden">
    <input id="__EVENTTARGET" name="__EVENTTARGET" type="hidden" value=""/>
    <input id="__EVENTARGUMENT" name="__EVENTARGUMENT" type="hidden" value=""/>
   </div>
   <div class="login-wrapper" id="pnlLogin" onkeypress="javascript:return WebForm_FireDefaultButton(event, 'btnLogin')">
    <div class="login-sidebar">
     <div id="login">
      <div class="form-group mb-3">
       <h1>
        Warwick SU
       </h1>
      </div>
      <div class="form-group mb-3">
       <label class="visually-hidden" for="txtUserName" id="lblUsername">
        Username
       </label>
       <input autofocus="" class="form-control" id="txtUserName" name="txtUserName" placeholder="Username" type="text"/>
      </div>
      <div class="form-group mb-3">
       <label class="visually-hidden" for="txtPassword" id="lblPassword">
        Password
       </label>
       <input class="form-control" id="txtPassword" name="txtPassword" placeholder="Password" type="password"/>
      </div>
      <div class="form-group mb-3">
       <input class="form-control btn btn-primary" id="btnLogin" name="btnLogin" type="submit" value="Log in"/>
      </div>
      <div class="form-group mb-3">
      </div>
      <div class="form-group mb-3">
       <a href="https://knowledge.ukmsl.com/loginhelp/">
        Need help?
       </a>
      </div>
     </div>
    </div>
   </div>
   <script type="text/javascript">
    //<![CDATA[
var theForm = document.forms['form1'];
if (!theForm) {
    theForm = document.form1;
}
function __doPostBack(eventTarget, eventArgument) {
    if (!theForm.onsubmit || (theForm.onsubmit() != false)) {
        theForm.__EVENTTARGET.value = eventTarget;
        theForm.__EVENTARGUMENT.value = eventArgument;
        theForm.submit();
    }
}
//]]>
   </script>
   <script src="/msl/WebResource.axd?d=pynGkmcFUV13He1Qd6_TZMx8Nc_bHs-7JqS9NFkwDFmpqQN4LJRJUdVeOuv8PEl2hSQQ0saoHGFUzxT843dBhg2&amp;t=638901572248157332" type="text/javascript">
   </script>
  </form>
 </body>
</html>
